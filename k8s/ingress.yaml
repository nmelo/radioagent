---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: radio-brain-ingress
  namespace: radio-agent
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
spec:
  ingressClassName: traefik
  rules:
    - host: radio.ker4s.com
      http:
        paths:
          - path: /stream
            pathType: Prefix
            backend:
              service:
                name: icecast
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: brain
                port:
                  number: 8001
  tls:
    - hosts:
        - radio.ker4s.com
      secretName: radio-ker4s-tls
