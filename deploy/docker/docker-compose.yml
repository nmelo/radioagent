# Agent Radio - Docker Compose
#
# From repo root:
#   CPU (default):  docker compose -f deploy/docker/docker-compose.yml up
#   GPU (Kokoro):   COMPOSE_PROFILES=gpu docker compose -f deploy/docker/docker-compose.yml up

x-brain: &brain-base
  build:
    context: ../..
    dockerfile: deploy/docker/Dockerfile.brain
  ports:
    - "8001:8001"
  volumes:
    - shared:/tmp/agent-radio
    # Copy deploy/docker/config.yaml.example to deploy/docker/config.yaml and set passwords
    - ./config.yaml:/app/config.yaml:ro
    - ${TONES_DIR:-../../audio/tones}:/tones:ro
  depends_on:
    icecast:
      condition: service_healthy
    liquidsoap:
      condition: service_started
  restart: unless-stopped

services:
  icecast:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.icecast
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/status-json.xsl || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  liquidsoap:
    image: savonet/liquidsoap:v2.3.2
    volumes:
      - ../../config/radio.liq:/radio.liq:ro
      - shared:/tmp/agent-radio
      - ${MUSIC_DIR:-../../music}:/music:ro
    command: ["liquidsoap", "/radio.liq"]
    environment:
      ICECAST_HOST: icecast
      ICECAST_SOURCE_PASSWORD: CHANGE_ME_source
      RADIO_MUSIC_DIR: /music
      LIQUIDSOAP_SOCKET_PATH: /tmp/agent-radio/liquidsoap.sock
    depends_on:
      icecast:
        condition: service_healthy
    restart: unless-stopped

  brain:
    <<: *brain-base
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.brain
      args:
        REQUIREMENTS: requirements-cpu.txt
    profiles:
      - cpu

  brain-gpu:
    <<: *brain-base
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu

volumes:
  shared:
