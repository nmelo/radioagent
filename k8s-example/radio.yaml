---
# Combined pod: liquidsoap + brain share an emptyDir for the Unix socket
# and WAV files at /tmp/agent-radio.
#
# NODE PLACEMENT: The music volume must be accessible on the scheduled node.
# Update the nodeSelector below to match a node in your cluster that has
# the music directory, and update the hostPath accordingly.
# Alternatively, replace the hostPath volumes with a PersistentVolumeClaim.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radio
  namespace: radio-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: radio
  template:
    metadata:
      labels:
        app: radio
    spec:
      # Pin to the node that has your music and tones directories.
      # Replace YOUR_NODE_HOSTNAME with the output of: kubectl get nodes -o wide
      nodeSelector:
        kubernetes.io/hostname: YOUR_NODE_HOSTNAME
      initContainers:
        - name: init-shared
          image: busybox
          command: ["sh", "-c", "mkdir -p /tmp/agent-radio && chmod 777 /tmp/agent-radio"]
          volumeMounts:
            - name: shared
              mountPath: /tmp/agent-radio
      containers:
        # --- Liquidsoap sidecar ---
        - name: liquidsoap
          image: savonet/liquidsoap:v2.2.4
          command: ["liquidsoap", "/radio.liq"]
          volumeMounts:
            - name: shared
              mountPath: /tmp/agent-radio
            - name: radio-liq
              mountPath: /radio.liq
              subPath: radio.liq
            - name: music
              mountPath: /music
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1Gi

        # --- Brain sidecar ---
        - name: brain
          # Replace YOUR_REGISTRY with your container registry
          image: YOUR_REGISTRY/radio-agent-brain:latest
          ports:
            - containerPort: 8001
          env:
            # Inject icecast password from Secret so brain reads it at startup
            - name: ICECAST_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: icecast-credentials
                  key: source-password
          volumeMounts:
            - name: shared
              mountPath: /tmp/agent-radio
            - name: brain-config
              mountPath: /app/config.yaml
              subPath: config.yaml
            - name: tones
              mountPath: /tones
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 4Gi
            limits:
              cpu: 4000m
              memory: 8Gi
          readinessProbe:
            httpGet:
              path: /now-playing
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: shared
          emptyDir: {}
        - name: radio-liq
          configMap:
            name: radio-liq
        - name: brain-config
          configMap:
            name: brain-config
        # Music directory on the host node. Replace /data/music with the
        # actual path on YOUR_NODE_HOSTNAME, or use a PersistentVolumeClaim.
        - name: music
          hostPath:
            path: /data/music
            type: Directory
        # Tones directory on the host node. Replace /data/agent-radio/tones
        # or use a PersistentVolumeClaim.
        - name: tones
          hostPath:
            path: /data/agent-radio/tones
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: brain
  namespace: radio-agent
spec:
  type: NodePort
  selector:
    app: radio
  ports:
    - name: http
      port: 8001
      targetPort: 8001
      nodePort: 30810
