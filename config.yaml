# Music
music_dir: /opt/agent-radio/music
music_ai_enabled: false
music_ai_prompt: "calm ambient music, soft pads, gentle drone, deep reverb"

# TTS
tts_engine: kokoro
tts_voice: af_heart
tts_speed: 1.0

# Webhook server
webhook_port: 8001
webhook_rate_limit: 10

# Liquidsoap
liquidsoap_socket: /tmp/agent-radio.sock

# Icecast
icecast_host: localhost
icecast_port: 8000
icecast_mount: /stream
icecast_password: agent-radio-src

# Announcements
suppress_kinds:
  - "*.idle"
  - "*.message"
max_announcement_words: 40
